name: tbvpn-relay
on:
  workflow_dispatch:
    inputs:
      relay_uuid:
        description: 'VLESS UUID'
        required: false
        default: ''
jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - name: Download xray
        run: |
          curl -fsSL https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip -o xray.zip
          unzip xray.zip xray
          chmod +x xray

      - name: Write xray config
        run: |
          UUID="${{ github.event.inputs.relay_uuid }}"
          if [ -z "$UUID" ]; then UUID=$(cat /proc/sys/kernel/random/uuid); fi
          echo "RELAY_UUID=$UUID" >> $GITHUB_ENV
          cat > config.json << EOF
          {
            "log": { "loglevel": "warning" },
            "inbounds": [{
              "port": 8080, "listen": "0.0.0.0",
              "protocol": "vless",
              "settings": { "clients": [{ "id": "$UUID", "level": 0 }], "decryption": "none" },
              "streamSettings": { "network": "ws", "wsSettings": { "path": "/" } }
            }],
            "outbounds": [{ "protocol": "freedom" }]
          }
          EOF

      - name: Start xray
        run: ./xray run -config config.json &

      - name: Start cloudflared tunnel
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o cloudflared
          chmod +x cloudflared
          ./cloudflared tunnel --no-autoupdate --url http://localhost:8080 > /tmp/tunnel.log 2>&1 &
          sleep 10
          TUNNEL_URL=$(grep -o 'https://[a-z0-9-]*\.trycloudflare\.com' /tmp/tunnel.log | head -1)
          echo "TUNNEL_URL=$TUNNEL_URL" >> $GITHUB_ENV
          echo "$TUNNEL_URL" > relay-url.txt
          echo "Relay: $TUNNEL_URL"

      - name: Upload relay URL
        uses: actions/upload-artifact@v4
        with:
          name: relay-url
          path: relay-url.txt
          retention-days: 1

      - name: Keep alive (up to 5h)
        run: |
          echo "UUID=$RELAY_UUID  URL=$TUNNEL_URL"
          for i in $(seq 1 300); do sleep 60; echo "alive $i/300"; done
