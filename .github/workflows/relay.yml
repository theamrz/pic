name: tbvpn-relay
on:
  workflow_dispatch:
    inputs:
      relay_uuid:
        description: 'VLESS UUID'
        required: false
        default: ''
jobs:
  relay:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    permissions:
      contents: write
    steps:
      - name: Download xray
        run: |
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -q Xray-linux-64.zip xray
          chmod +x xray

      - name: Write xray config
        run: |
          UUID="${{ github.event.inputs.relay_uuid }}"
          if [ -z "$UUID" ]; then UUID=$(cat /proc/sys/kernel/random/uuid); fi
          printf '{"log":{"loglevel":"warning"},"inbounds":[{"port":8080,"protocol":"vless","settings":{"clients":[{"id":"%s","encryption":"none"}],"decryption":"none"},"streamSettings":{"network":"ws","wsSettings":{"path":"/"}}}],"outbounds":[{"protocol":"freedom"}]}' "$UUID" > xray-config.json
          echo "UUID=$UUID" >> $GITHUB_ENV

      - name: Start xray
        run: nohup ./xray run -c xray-config.json > /tmp/xray.log 2>&1 &

      - name: Start tunnels (cloudflared + pinggy in parallel)
        run: |
          # --- cloudflared ---
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          nohup ./cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cf.log --no-autoupdate 2>&1 &

          # --- pinggy (Singapore/EU servers, SSH on port 443) ---
          ssh -p 443 \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ExitOnForwardFailure=yes \
            -o LogLevel=VERBOSE \
            -R0:localhost:8080 a.pinggy.io 2>&1 | tee /tmp/pinggy.log &

          # Wait for first URL (up to 45s)
          URL=""
          for i in $(seq 1 15); do
            sleep 3
            if [ -z "$URL" ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9_-]*\.trycloudflare\.com' /tmp/cf.log 2>/dev/null | head -1)
            fi
            if [ -z "$URL" ]; then
              URL=$(grep -o 'https://[a-zA-Z0-9_-]*\.a\.pinggy\.io' /tmp/pinggy.log 2>/dev/null | head -1)
            fi
            if [ -n "$URL" ]; then
              echo "Tunnel URL: $URL"
              break
            fi
          done

          if [ -z "$URL" ]; then
            echo "=== cloudflared log ==="
            cat /tmp/cf.log 2>/dev/null || echo "empty"
            echo "=== pinggy log ==="
            cat /tmp/pinggy.log 2>/dev/null || echo "empty"
            exit 1
          fi
          echo "TUNNEL_URL=$URL" >> $GITHUB_ENV

      - name: Write URL to repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RUN_ID="${{ github.run_id }}"
          ENCODED=$(echo -n "$TUNNEL_URL" | base64 -w0)
          SHA_FILE=$(curl -sf --resolve "api.github.com:443:140.82.121.5" \
            -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/relay-urls/${RUN_ID}.txt" \
            | python3 -c "import json,sys; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          if [ -n "$SHA_FILE" ]; then
            BODY=$(printf '{"message":"relay url","content":"%s","sha":"%s"}' "$ENCODED" "$SHA_FILE")
          else
            BODY=$(printf '{"message":"relay url","content":"%s"}' "$ENCODED")
          fi
          curl -s -X PUT --resolve "api.github.com:443:140.82.121.5" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/${{ github.repository }}/contents/relay-urls/${RUN_ID}.txt" \
            -d "$BODY"
          echo "Written: $TUNNEL_URL for run $RUN_ID"

      - name: Keep alive
        run: for i in $(seq 1 350); do sleep 60; echo "alive $i $TUNNEL_URL"; done
